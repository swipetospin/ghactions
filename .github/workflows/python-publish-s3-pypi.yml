name: Publish Python package to internal PyPI (S3)

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
      python_version:
        type: string
        default: "3.10"
      package_root:
        type: string
        default: "."
      ghactions_ref:
        type: string
        default: "main"

    secrets:
      pypi_publish_role_arn:
        required: true

permissions:
  id-token: write
  contents: write

concurrency:
  group: publish-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout caller repo (the package)
      - name: Checkout package repo
        uses: actions/checkout@v4

      # 2) Checkout ghactions repo (to access scripts)
      - name: Checkout ghactions
        uses: actions/checkout@v4
        with:
          repository: swipetospin/ghactions
          ref: ${{ inputs.ghactions_ref }}
          path: .ghactions

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.pypi_publish_role_arn }}
          aws-region: us-east-1

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 packaging build

      - name: Compute version metadata
        id: meta
        run: |
          python .ghactions/scripts/pypi_s3/package_meta.py \
            --package-name "${{ inputs.package_name }}" \
            --package-root "${{ inputs.package_root }}" >> "$GITHUB_OUTPUT"

      # Publish pre-releases from non-default branches only
      - name: Publish pre-release (non-default)
        if: |
          github.ref != format('refs/heads/{0}', github.event.repository.default_branch) &&
          steps.meta.outputs.release_type == 'prerelease'
        run: |
          python .ghactions/scripts/pypi_s3/publish_s3_pypi.py \
            --package-name "${{ inputs.package_name }}" \
            --package-root "${{ inputs.package_root }}" \
            --bucket "spincar-pypi"

      # Publish stable releases from default branch only (guardrail)
      - name: Publish stable (default branch only)
        if: |
          github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
          steps.meta.outputs.release_type == 'stable'
        run: |
          python .ghactions/scripts/pypi_s3/publish_s3_pypi.py \
            --package-name "${{ inputs.package_name }}" \
            --package-root "${{ inputs.package_root }}" \
            --bucket "spincar-pypi"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          bash .ghactions/scripts/pypi_s3/create_github_release.sh \
            --version "${{ steps.meta.outputs.normalized_version }}" \
            --release-type "${{ steps.meta.outputs.release_type }}" \
            --default-branch "${{ github.event.repository.default_branch }}"
