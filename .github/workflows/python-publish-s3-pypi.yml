name: Publish Python package to internal PyPI (S3)

on:
  workflow_call:
    inputs:
      package_name:
        type: string
        required: true
      python_version:
        type: string
        default: "3.10"
      pypi_bucket:
        type: string
        default: "spincar-pypi"
      aws_region:
        type: string
        default: "us-east-1"
      create_github_release:
        type: boolean
        default: true

    secrets:
      pypi_publish_role_arn:
        required: true

permissions:
  id-token: write
  contents: write

concurrency:
  group: publish-${{ github.repository }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      # 1) Checkout caller repo (the package)
      - name: Checkout package repo
        uses: actions/checkout@v4

      # 2) Checkout ghactions repo (to access scripts)
      - name: Checkout ghactions
        uses: actions/checkout@v4
        with:
          repository: swipetospin/ghactions
          path: .ghactions

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.pypi_publish_role_arn }}
          aws-region: ${{ inputs.aws_region }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install boto3 packaging build

      - name: Compute version metadata
        id: meta
        run: |
          python .ghactions/python/pypi_s3/package_meta.py \
            --package-name "${{ inputs.package_name }}" >> "$GITHUB_OUTPUT"

      # Publish pre-releases from non-master only
      - name: Publish pre-release (non-master)
        if: |
          github.ref != 'refs/heads/master' &&
          steps.meta.outputs.release_type == 'prerelease'
        run: |
          python .ghactions/python/pypi_s3/publish_s3_pypi.py \
            --package-name "${{ inputs.package_name }}" \
            --bucket "${{ inputs.pypi_bucket }}"

      # Publish stable releases from master only (guardrail)
      - name: Publish stable (master only)
        if: |
          github.ref == 'refs/heads/master' &&
          steps.meta.outputs.release_type == 'stable'
        run: |
          python .ghactions/python/pypi_s3/publish_s3_pypi.py \
            --package-name "${{ inputs.package_name }}" \
            --bucket "${{ inputs.pypi_bucket }}"

      - name: Create GitHub release (optional)
        if: ${{ inputs.create_github_release }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          ver="${{ steps.meta.outputs.normalized_version }}"
          reltype="${{ steps.meta.outputs.release_type }}"

          # Only create release if we actually published something in this run:
          if [ "${reltype}" = "stable" ] && [ "${GITHUB_REF}" != "refs/heads/master" ]; then
            echo "Not publishing stable (not master); skipping GitHub release."
            exit 0
          fi
          if [ "${reltype}" = "prerelease" ] && [ "${GITHUB_REF}" = "refs/heads/master" ]; then
            echo "Not publishing prerelease on master (by design); skipping GitHub release."
            exit 0
          fi

          if gh release view "v${ver}" >/dev/null 2>&1; then
            echo "Release v${ver} already exists; skipping."
            exit 0
          fi

          if [ "${reltype}" = "prerelease" ]; then
            gh release create "v${ver}" --prerelease --target "${GITHUB_SHA}" --title "v${ver}" --notes ""
          else
            gh release create "v${ver}" --target "${GITHUB_SHA}" --title "v${ver}" --notes ""
          fi
